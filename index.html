  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f8f6;
      --surface: #ffffff;
      --border: #e5e5e2;
      --border-strong: #d0d0cc;
      --text-primary: #1a1a18;
      --text-secondary: #6b6b66;
      --text-muted: #9e9e98;
      --accent: #2563eb;
      --accent-bg: #eff6ff;
      --accent-text: #1d4ed8;
      --radius: 12px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ── HERO ── */
    .hero {
      max-width: 680px;
      margin: 0 auto;
      padding: 3rem 1.5rem 2rem;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    .avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--accent-bg);
      color: var(--accent-text);
      font-size: 22px; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.25rem;
      border: 2px solid var(--border);
    }
    /* ── To add a photo: replace the initials div above with: ──
       <img src="your-photo.jpg" alt="Your Name" class="avatar" style="object-fit:cover"> */

    .hero h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
    .hero .tagline { font-size: 14px; color: var(--text-secondary); margin-bottom: 4px; }
    .hero .subtitle { font-size: 12px; color: var(--text-muted); margin-bottom: 1.25rem; }

    .hero-links { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .hero-link {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 20px;
      border: 1px solid var(--border-strong);
      font-size: 12px; font-weight: 500; color: var(--text-secondary);
      text-decoration: none; transition: border-color 0.15s, color 0.15s;
    }
    .hero-link:hover { border-color: var(--accent); color: var(--accent); }
    .hero-link svg { width: 14px; height: 14px; }

    /* ── MAIN LAYOUT ── */
    .container { max-width: 960px; margin: 0 auto; padding: 0 1.5rem 3rem; }

    /* ── FILTERS ── */
    .filter-bar {
      display: flex; gap: 8px; padding: 1.25rem 0;
      flex-wrap: wrap; align-items: center;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .filter-label { font-size: 12px; color: var(--text-muted); margin-right: 4px; }
    .filter-btn {
      padding: 5px 14px; border-radius: 20px;
      border: 1px solid var(--border-strong);
      font-size: 12px; font-weight: 500; color: var(--text-secondary);
      cursor: pointer; background: transparent;
      transition: all 0.15s; font-family: var(--font);
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active {
      background: var(--accent-bg); color: var(--accent-text);
      border-color: var(--accent);
    }

    /* ── COUNT ── */
    .count-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1rem;
    }
    .count-label { font-size: 12px; color: var(--text-muted); }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    .cert-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: box-shadow 0.2s, border-color 0.2s, transform 0.15s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .cert-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      border-color: var(--border-strong);
      transform: translateY(-2px);
    }

    .cert-preview {
      height: 130px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .cert-icon { width: 48px; height: 48px; }
    .cert-badge {
      position: absolute; top: 10px; right: 10px;
      font-size: 10px; font-weight: 500;
      padding: 3px 8px; border-radius: 20px;
    }

    .cert-body { padding: 14px; }
    .cert-title {
      font-size: 13px; font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 4px; line-height: 1.4;
    }
    .cert-issuer { font-size: 11px; color: var(--text-secondary); margin-bottom: 10px; }
    .cert-meta { display: flex; align-items: center; justify-content: space-between; }
    .cert-date { font-size: 11px; color: var(--text-muted); }
    .cert-action {
      font-size: 11px; color: var(--accent);
      display: flex; align-items: center; gap: 3px;
      font-weight: 500;
    }

    /* ── EMPTY ── */
    .empty {
      grid-column: 1 / -1;
      text-align: center; padding: 3rem;
      color: var(--text-muted); font-size: 14px;
    }

    /* ── ADD CARD ── */
    .add-card {
      border: 1.5px dashed var(--border-strong);
      border-radius: var(--radius);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; padding: 2rem 1rem;
      cursor: pointer; transition: background 0.15s;
      text-decoration: none;
      min-height: 200px;
    }
    .add-card:hover { background: rgba(0,0,0,0.02); }
    .add-card span { font-size: 13px; color: var(--text-muted); }

    /* ── MODAL ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 100;
      align-items: center; justify-content: center; padding: 1.5rem;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border-radius: var(--radius);
      padding: 1.5rem; max-width: 440px; width: 100%;
      position: relative;
    }
    .modal-close {
      position: absolute; top: 12px; right: 12px;
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 18px; line-height: 1;
    }
    .modal-preview {
      height: 100px; border-radius: 8px; margin-bottom: 1rem;
      display: flex; align-items: center; justify-content: center; font-size: 40px;
    }
    .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .modal .modal-issuer { font-size: 13px; color: var(--text-secondary); margin-bottom: 1rem; }
    .modal-link {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent); color: white;
      padding: 8px 16px; border-radius: 8px;
      font-size: 13px; font-weight: 500; text-decoration: none;
    }
    .modal-link:hover { opacity: 0.9; }

    /* ── RESPONSIVE ── */
    @media (max-width: 500px) {
      .hero { padding: 2rem 1rem 1.5rem; }
      .grid { grid-template-columns: 1fr 1fr; gap: 12px; }
    }

    /* ─── Render & filter ─── */
    let currentFilter = 'all';

    function render(list) {
      const grid = document.getElementById('cert-grid');
      const label = document.getElementById('count-label');
      label.textContent = list.length + ' certificate' + (list.length !== 1 ? 's' : '');

      if (!list.length) {
        grid.innerHTML = '<p class="empty">No certificates in this category yet.</p>';
        return;
      }

      const cards = list.map(c => `
        <a class="cert-card" onclick="openModal(${c.id}); return false;" href="${c.file}" role="button">
          <div class="cert-preview" style="background:${c.preview}">
            <span class="cert-icon" style="font-size:40px; line-height:1">${c.icon}</span>
            <span class="cert-badge" style="background:${c.badgeBg}; color:${c.badgeColor}">${c.badge}</span>
          </div>
          <div class="cert-body">
            <div class="cert-title">${c.title}</div>
            <div class="cert-issuer">${c.issuer}</div>
            <div class="cert-meta">
              <span class="cert-date">📅 ${c.date}</span>
              <span class="cert-action">View ↗</span>
            </div>
          </div>
        </a>
      `).join('');

      // Add "add certificate" placeholder at the end
      grid.innerHTML = cards + `
        <div class="add-card" title="Add a certificate">
          <span style="font-size:28px; color:var(--text-muted)">+</span>
          <span>Add a certificate</span>
        </div>
      `;
    }

    function filter(cat, btn) {
      currentFilter = cat;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const list = cat === 'all' ? CERTS : CERTS.filter(c => c.category === cat);
      render(list);
    }

    /* ─── Modal ─── */
    function openModal(id) {
      const c = CERTS.find(x => x.id === id);
      if (!c) return;
      document.getElementById('modal-preview').style.background = c.preview;
      document.getElementById('modal-preview').textContent = c.icon;
      document.getElementById('modal-preview').style.fontSize = '52px';
      document.getElementById('modal-title').textContent = c.title;
      document.getElementById('modal-issuer').textContent = c.issuer;
      document.getElementById('modal-date').textContent = 'Issued ' + c.date;
      document.getElementById('modal-link').href = c.file;
      document.getElementById('modal-overlay').classList.add('open');
    }

    function closeModal(target) {
      if (target === true || target.target === document.getElementById('modal-overlay')) {
        document.getElementById('modal-overlay').classList.remove('open');
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal(true);
    });

    /* ─── Init ─── */
    render(CERTS);
